<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>VoteSecure</title>

  
  <link rel="stylesheet" href="css/styles.css"/>
  <link rel="stylesheet" href="./css/toast.css"/>
</head>
<body>

  <nav class="navbar">
    <div class="logo">VoteSecure</div>

    <div class="nav-links">
     <a href="login.html" class="login-btn">Login</a>
      <a href="register.html" class="register-btn">Register</a>
    </div>
  </nav>

  <section class="hero">

    <div class="hero-left">
      <h1>
        Digital Voting Platform
      </h1>

      <p>
        Secure, transparent and intelligent voting system
        for all schools and faculties.
      </p>

      <div class="hero-buttons">
        <a href="./register.html" class="primary-btn">
          Create Account
        </a>

        <a href="./login.html" class="secondary-btn">
          Login
        </a>
      </div>
    </div>

    <div class="hero-right">
      <div class="glass-card">

        <h2>Live Election System</h2>

        <div class="stats">

          <div class="stat-box">
            <h3>12</h3>
            <p>Groups</p>
          </div>

          <div class="stat-box">
            <h3>100%</h3>
            <p>Secure</p>
          </div>

          <div class="stat-box">
            <h3></h3>
            <p>Auto Close</p>
          </div>

        </div>
      </div>
    </div>

  </section>
<script src="./js/toast.js"></script>
</body>
</html>
