<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8"/>
<meta name="api-base-url" content="https://your-backend.onrender.com" />

<meta
  name="viewport"
  content="width=device-width, initial-scale=1.0"
/>

<title>
Election Results
</title>

<link
  rel="stylesheet"
  href="./css/result.css"
/>
  <link rel="stylesheet" href="./css/toast.css"/>

</head>

<body>

<div class="results-page">

  <div class="results-header">

    <h1>
      Election Results
    </h1>

  </div>

  <!-- SEARCH -->
  <div
    class="results-search"
    id="resultsSearch"
  >

    <input
      type="text"
      id="schoolSearch"
      placeholder="Search school or faculty..."
    />

  </div>

  <!-- RESULTS -->
  <div
    id="resultsContainer"
    class="results-grid"
  ></div>

</div>

<script src="./js/config.js"></script>
<script src="./js/toast.js"></script>
<script src="./js/result.js"></script>

</body>
</html>
