<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8"/>
<meta name="api-base-url" content="http://localhost:5000" />

<meta
  name="viewport"
  content="width=device-width, initial-scale=1.0"
/> 

<title>
Election Results
</title>

<link
  rel="stylesheet"
  href="./css/result.css"
/>
  <link rel="stylesheet" href="./css/toast.css"/>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" crossorigin="anonymous" referrerpolicy="no-referrer" />

</head>

<body>

<div class="results-page">

  <div class="results-header">

    <h1>
      <i class="fa-solid fa-chart-simple"></i> Election Results
    </h1>

  </div>

  <!-- SEARCH -->
  <div
    class="results-search"
    id="resultsSearch"
  >
    <div class="school-search-container" id="schoolSearchContainer" style="display:none;">
      <input
        type="text"
        id="schoolSearch"
        placeholder="Search school or faculty..."
      />
    </div>

    <div class="sort-controls" id="sortControls" style="display:none;">
      <label for="sortSelect">Sort by</label>
      <select id="sortSelect">
        <option value="date-desc">Date newest</option>
        <option value="date-asc">Date oldest</option>
        <option value="name-asc">Name A-Z</option>
        <option value="name-desc">Name Z-A</option>
      </select>
    </div>

  </div>

  <!-- RESULTS -->
  <div
    id="resultsContainer"
    class="results-grid"
  ></div>

</div>

<script src="./js/config.js"></script>
<script src="./js/authGuard.js"></script>
<script src="./js/toast.js"></script>
<script src="./js/result.js"></script>

</body>
</html>
